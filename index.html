<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyra Craft | The Future of Freshness</title>
    <meta name="description"
        content="Introducing India’s premium rectangular, microwave-safe stainless steel lunch boxes designed for the modern lifestyle. Launching May 2026.">
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Background Elements for Premium Feel -->
    <div class="bg-glow"></div>
    <div class="bg-glow bg-glow-2"></div>

    <main class="container">
        <header>
            <div class="logo-container">
                <!-- Using a relative path so user can place their logo here -->
                <img src="logo.png" alt="Kyra Craft Logo" class="brand-logo" id="logo">
            </div>
        </header>

        <section class="hero">
            <h1 class="headline">The Future of <span class="text-gradient">Freshness</span> is Coming Soon.</h1>
            <p class="sub-headline">
                Introducing India’s premium rectangular, microwave-safe stainless steel lunch boxes designed for the
                modern lifestyle.
            </p>

            <form class="signup-form" id="notifyForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Enter your email for early access" required>
                    <button type="submit" class="btn-primary">
                        <span>Notify Me</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
                <p class="form-message" id="formMessage"></p>
            </form>
        </section>

        <footer>
            <p class="launch-date">Launching May 2026</p>
            <div class="social-links">
                <a href="https://www.instagram.com/kyracraft.official?igsh=MWpuMTlobHI2eTdlbg%3D%3D&utm_source=qr"
                    aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>

</html>
